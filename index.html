<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="c:xampp/htdocs/asset/css/stylos.css">
    <style>
        :root {
            --bg: #eef4ff;
            --card: #ffffff;
            --text: #1d2939;
            --muted: #475569;
            --accent: #4f46e5;
            --border: #cbd5e1;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #dbeafe 0%, #eff6ff 100%);
            background-attachment: fixed;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .page {
            width: 100%;
            max-width: 520px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.1);
            padding: 24px;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page h2 {
            margin-top: 0;
            margin-bottom: 18px;
            color: #0f172a;
            font-size: clamp(1.25rem, 5vw, 1.5rem);
            letter-spacing: -0.02em;
        }

        .field {
            display: grid;
            gap: 8px;
            margin-bottom: 18px;
        }

        label {
            font-size: clamp(0.875rem, 2vw, 0.95rem);
            color: var(--muted);
            font-weight: 500;
        }

        input[type="number"],
        input[type="date"],
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            background: #f8fafc;
            color: var(--text);
            font-size: clamp(0.95rem, 2vw, 1rem);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
        }

        .button-row {
            display: grid;
            gap: 10px;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: clamp(0.95rem, 2vw, 1rem);
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #4338ca 0%, #6d28d9 100%);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            min-height: 44px;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 30px rgba(79, 70, 229, 0.18);
        }

        button:active {
            transform: translateY(0);
        }

        button:focus {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .note {
            margin-top: 8px;
            font-size: clamp(0.85rem, 2vw, 0.92rem);
            color: var(--muted);
        }

        /* Mobile First - Estilos base para móviles */
        @media (max-width: 480px) {
            body {
                padding: 12px;
                min-height: 100dvh;
            }

            .page {
                padding: 20px;
                border-radius: 16px;
            }

            .page h2 {
                margin-bottom: 16px;
            }

            .field {
                gap: 6px;
                margin-bottom: 16px;
            }

            input[type="number"],
            input[type="date"],
            input[type="text"] {
                padding: 12px 14px;
            }

            button {
                padding: 12px 16px;
                min-height: 48px;
                border-radius: 10px;
            }
        }

        /* Tablets */
        @media (min-width: 481px) and (max-width: 768px) {
            body {
                padding: 20px;
            }

            .page {
                padding: 28px;
            }
        }

        /* Desktop */
        @media (min-width: 769px) {
            body {
                padding: 24px;
            }

            .page {
                padding: 32px;
                box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
            }

            button:hover {
                transform: translateY(-1px);
            }
        }

        /* Landscape mode en móviles */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                min-height: auto;
                padding: 10px;
            }

            .page {
                padding: 16px;
                max-height: 90vh;
                overflow-y: auto;
            }

            .page h2 {
                margin-bottom: 12px;
            }

            .field {
                margin-bottom: 12px;
            }
        }

        /* Pantallas grandes */
        @media (min-width: 1024px) {
            .page {
                border-radius: 24px;
            }

            button {
                border-radius: 12px;
            }
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            :root {
                --card: #1e293b;
                --text: #f1f5f9;
                --muted: #94a3b8;
                --border: #334155;
            }

            body {
                background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            }

            input[type="number"],
            input[type="date"],
            input[type="text"] {
                background: #334155;
                color: #f1f5f9;
            }
        }

        /* Reduce motion */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>-->
</head>

<body>
    <div class="page">
        <div class="field">
            <label for="numeroinput">Ingresa un número.</label>
            <input type="number" id="numeroinput" placeholder="Ej. 15">
            <button onclick="comprobar()">Comprobar</button>
        </div>

        <div class="field">
            <label for="dateinput">Selecciona una fecha</label>
            <input type="date" id="dateinput">
            <button onclick="comprobar2()">Comprobar cita</button>
            <p class="note">El sistema compara la fecha con hoy.</p>
        </div>

        <h2>Cambiar título de la pestaña</h2>
        <div class="field">
            <label for="nuevoTitulo">Nuevo título</label>
            <input type="text" id="nuevoTitulo" placeholder="Escribe el nuevo título">
            <button id="btnCambiar">Cambiar título</button>
        </div>

        <h2>Cambiar fondo.</h2>
        <div class="field">
            <button id="btnAzul" style="background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);">Fondo azul
                claro</button>
        </div>

        <h2>Ir a Google</h2>
        <div class="field">
            <button id="btnGoogle"
                style="background: linear-gradient(135deg, #ea4335 0%, #fbbc04 50%, #34a853 100%);">Ir a
                dominio.</button>
        </div>
    </div>

    <script>

        document.getElementById("btnCambiar").addEventListener("click", () => {
            const titulo = document.getElementById("nuevoTitulo").value;

            if (titulo.trim() !== "") {
                document.title = titulo;
            }
        });

        document.getElementById("btnAzul").addEventListener("click", () => {
            document.body.style.background = "linear-gradient(135deg, #7dd3fc 0%, #38bdf8 100%)";
        });

        document.getElementById("btnGoogle").addEventListener("click", () => {
            window.location.href = "https://confident-perlman.87-106-228-101.plesk.page/";
        });







        function comprobar() {
            let numeroInput = document.getElementById("numeroinput").value;

            if (numeroInput > 0) {
                alert("positivo");
            }
            else { alert("negativo"); }

        }

        function comprobar2() {
            let ahora = new Date();
            //let aqui = ahora.toLocaleDateString('es-ES');

            let anio = ahora.getFullYear(); // Año (4 dígitos)
            let mes = ahora.getMonth() + 1; // Mes (0 = enero, 11 = diciembre)
            let dia = ahora.getDate(); // Día del mes (1-31)

            let aqui =
                String(anio).padStart(2, '0') + '-' +
                String(mes).padStart(2, '0') + '-' +
                dia;

            let dateInput = document.getElementById("dateinput").value;

            console.log(aqui);

            console.log(dateInput);

            if (aqui === dateInput) {
                alert("Hoy es tu cita");
            }

            else if (aqui > dateInput) {
                alert("perdiste la cita");
            }

            else {
                alert("tu cita sera en brebe");
            }


        }


    </script>
</body>

</html>
